spring.application.name=argovalue-backend
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/argovalue_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${PORT:5000}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.1.5:*,https://argovalue-fullstack.vercel.app,https://*.vercel.app}
